input_select:
  # Current awning automation mode
  awning_automation_mode:
    name: "Markisemodus"
    options:
      # Auto: Normal operation according to the weather forecast and the sun position
      - "Auto"
      # Aus bis Morgen: Manual override until the next midnight, then switch back to Auto
      - "Aus bis Morgen"
      # Aus: Automation is off, manual control only.
      - "Aus"

sensor:
  # A sliding window max of sunshine to avoid mowing the awning for every cloud
  - platform: statistics
    # The name defines the ID
    name: "Sunshine (sliding window)"
    unique_id: a72ec25a-1be4-48ee-bb01-2e504589e3e7
    entity_id: sensor.sunshine_at_8050
    state_characteristic: value_max
    max_age:
      # MeteoSwiss updates every 10 min; 2 intervals + 1 min to avoid momentary drops in the end
      minutes: 21
    # Use the last stored value in case there are no stored values in max_age (e.g. no changes since then)
    keep_last_sample: true
  # A sliding window max of precipitation to avoid opening the awning right after the last raindrop
  - platform: statistics
    # The name defines the ID
    name: "Precipitation (sliding window)"
    unique_id: 929f6911-aa5a-4de1-a57d-ad73db3c925b
    entity_id: sensor.precipitation_at_8050
    state_characteristic: value_max
    max_age:
      # MeteoSwiss updates every 10 min; 2 intervals + 1 min to avoid momentary drops in the end
      minutes: 21
    # Use the last stored value in case there are no stored values in max_age (e.g. no changes since then)
    keep_last_sample: true
  # A sliding window max of wind gusts to wait a bit before allowing the awning to be extended after a gust
  - platform: statistics
    # The name defines the ID
    name: "Wind gusts (sliding window)"
    unique_id: 87f747fe-ca3b-4d71-aac5-8e6752ccae06
    entity_id: sensor.wind_gusts_peak_1s_at_8050
    state_characteristic: value_max
    max_age:
      # MeteoSwiss updates every 10 min; 2 intervals + 1 min to avoid momentary drops in the end
      minutes: 21
    # Use the last stored value in case there are no stored values in max_age (e.g. no changes since then)
    keep_last_sample: true

template:
  # Trigger-based template sensor to get MeteoSwiss forecast data
  # to be used to control the awning
  - trigger:
      # The forecast is updated every hour;
      # 10:00 seems like a good balance between not too early for a better forecast
      # and not too late to still be able to check the blocks before diving into the day.
      - platform: time
        at: "10:00:00"
      # For debugging
      - platform: event
        event_type: "update_awning_forecast"
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.weather_at_8050
        data:
          type: hourly
        response_variable: hourly_data
    sensor:
      - name: "Awning forecast data"
        unique_id: awning_forecast_data
        # This seems to be the only way to affect the generated entity_id
        default_entity_id: "sensor.awning_forecast_data"
        # The state just shows when it was last updated
        state: "{{ now().isoformat() }}"
        attributes:
          # Forecast until the next sunset with datetimes being of a datetime format, not string
          hourly: >
            {# sun.sun datetime attributes are actually strings #}
            {% set rise = state_attr('sun.sun', 'next_rising') | as_datetime | as_local %}
            {% set set = state_attr('sun.sun', 'next_setting') | as_datetime | as_local %}
            
            {# next_rising is tomorrow if this is called after a sunrise --
               move the start bound to 1h before now for this case #}
            {% set start_bound = now() - timedelta(hours=1) if rise > set else rise + timedelta(hours=1) %}
            {% set end_bound = set - timedelta(hours=1) %}

            {# This is some HA/Jinja2 magic; apparently plain lists and .append() don't work in HA #}
            {% set ns = namespace(filtered=[]) %}
            {% for entry in hourly_data['weather.weather_at_8050'].forecast %}
              {# Convert the string datetime in the forecast to the real datytime type #}
              {% set entry_dt = entry.datetime | as_datetime %}
              {# Introduce an end datetime to somplify further processing #}
              {% set entry_end_dt = entry_dt + timedelta(hours=1) %}
              
              {% if start_bound <= entry_dt <= end_bound %}
                {# Convert the forecast date to the local timezone for readability #}
                {% set new_entry = dict(entry, datetime=(entry_dt | as_local).isoformat(), datetime_end=(entry_end_dt | as_local).isoformat()) %}
                {% set ns.filtered = ns.filtered + [new_entry] %}
              {% endif %}
            {% endfor %}

            {{ ns.filtered }}
  # Maximum awning opening (in %) no matter if it's automatic or manual.
  # This is a safety measure to prevent awnign damage.
  - sensor:
      - name: Maximale sichere Markisenausfahrt
        default_entity_id: sensor.awning_max_safe_opening
        unique_id: c94f2d29-f6de-4702-bfc8-f6a5ac59450a
        unit_of_measurement: "%"
        icon: mdi:shield-sun
        availability: >
          {{ has_value('sensor.wind_gusts_sliding_window') and 
             has_value('sensor.precipitation_at_8050') }}
        state: >
          {# Using sliding window for wind but exact value for precipitation as wind gusts can be 
             much more short-lived; additionally the only expected wind gusts mode here is 50% -- 
             really dangerous winds are supposed to be handled by a calendar event #}
          {% set wind_gusts = states('sensor.wind_gusts_sliding_window') | float %}
          {% set precipitation = states('sensor.precipitation_at_8050') | float %}

          {# Direct danger for the awning #}
          {% if precipitation > 0 or wind_gusts > 45 %}
          0
          {# Cautionary winds #}
          {% elif wind_gusts > 35 %}
          50
          {# Safe to fully extend #}
          {% else %}
          100
          {% endif %}
  # Awning opening (in %), the automation would apply if it was on.
  - sensor:
      - name: Automatic Markisenausfahrt
        default_entity_id: sensor.awning_auto_opening
        unique_id: 7bf639fa-f9ad-44f5-b4a4-829a51a8c2d2
        unit_of_measurement: "%"
        icon: mdi:shield-sun
        availability: >
          {{ has_value('sensor.temperature_at_8050') and 
             has_value('sensor.sunshine_sliding_window') and
             has_value('sensor.precipitation_sliding_window') and
             has_value('sensor.awning_max_safe_opening') }}
        state: >
          {% set sun_over_terrace = state_attr('sun.sun', 'azimuth') > 155 and 
            state_attr('sun.sun', 'elevation') > 28 %}
          {% set no_calendar_blocks = is_state('calendar.markise', 'off') %}

          {% set temp_high_enough = states('sensor.temperature_at_8050') | float > 10 %}
          {% set sunny_enough = states('sensor.sunshine_sliding_window') | float > 3 %}
          {% set some_time_after_rain = states('sensor.precipitation_sliding_window') | float == 0 %}

          {% set comfort_target = 0 %}
          {% if sun_over_terrace and no_calendar_blocks and temp_high_enough and sunny_enough and some_time_after_rain %}
            {% set comfort_target = 65 %}
          {% endif %}

          {# Defaulting to 0 is essential here to explicitly close the markise when the safety sensor is not available #}
          {% set max_allowed = states('sensor.awning_max_safe_opening') | int(0) %}

          {{ [comfort_target, max_allowed] | min }}

script:
  # A script to join adjacent forecast blocks to not have redundant calendar events.
  join_adjacent_forecast_blocks:
    alias: 'Join adjacent forecast blocks'
    description: ''
    mode: parallel
    fields:
      input_hours:
        description: The filtered list of hours from a MeteoSwiss hourly forecast
    sequence:
    - variables:
        aggregated: >
          {% set ns = namespace(events=[], current=none) %}
          {% for hour in input_hours %}
            {% set dt_start = hour.datetime %}
            {% set dt_end = hour.datetime_end%}
            {% if ns.current is none %}
              {# Handle the first entry #}
              {% set ns.current = {'start': dt_start, 'end': dt_end} %}
            {% else %}
              {% if dt_start == ns.current.end %}
                {% set ns.current = dict(ns.current, end=dt_end) %}
              {% else %}
                {% set ns.events = ns.events + [ns.current] %}
                {% set ns.current = {'start': dt_start, 'end': dt_end} %}
              {% endif %}
            {% endif %}
          {% endfor %}
          
          {% if ns.current is not none %}
            {% set ns.events = ns.events + [ns.current] %}
          {% endif %}
          
          {# HA magic: scripts must return key-values, not just lists #}
          {{ dict(events=ns.events) }}
    - stop: Done
      response_variable: aggregated


automation:
  - alias: Awning Manual --> Auto
    description: Manual overrides work for a day only. This automation switches it to
      Auto every midnight.
    # TODO: replace with a meaningful ID when switching to a new HA instance
    id: '1774900581887'
    triggers:
    - trigger: time
      at: 00:00:00
    conditions:
    - condition: state
      entity_id: input_select.awning_automation_mode
      state:
      - Aus bis Morgen
    actions:
    - action: input_select.select_option
      metadata: {}
      data:
        option: Auto
      target:
        entity_id: input_select.awning_automation_mode
    mode: single

  - alias: Awning automation manual override
    description: "Turn off the awning automation by external closing. 
      This is mostly a safety measure to be able to intercept the automation when HA is not reachable."
    id: d36b071e-805f-4ee1-b19c-2e23d2deab98
    mode: single
    triggers:
    - trigger: state
      entity_id:
        - cover.sonoff_10018b1f1b
      to: closed
    conditions:
    - alias: Awning automation is on
      condition: state
      entity_id: input_select.awning_automation_mode
      state:
      - Auto
    - alias: Triggered not by HA automation
      condition: template
      # See the design doc for the comprehensive analysis of move events for different triggers.
      # WARNING: that this is not 100% reliable and sometimes passes even automation-triggered closings.
      value_template: >
        {# HA sets parent_id for automation-triggered moves #}
        {{ trigger.from_state.context.parent_id == none }}
    - alias: Manual override detection (closed when auto wanted it open)
      condition: template
      value_template: >
        {% set actual_pos = state_attr('cover.sonoff_10018b1f1b', 'current_position') | int %}
        {# Default to 100 to make full close disable automation when the comfort level is unavailable #}
        {% set auto_target = states('sensor.awning_auto_opening') | int(100) %}
        {{ actual_pos < 10 and actual_pos < auto_target }}
    actions:
    - action: input_select.select_option
      metadata: {}
      target:
        entity_id: input_select.awning_automation_mode
      data:
        option: Aus bis Morgen

  - alias: Prevent unsafe awning moves
    description: Do not allow manual moves that exceed the safe limit.
    id: 43eb7042-e770-4f62-9542-3f9a4386fe47
    mode: single
    triggers:
    - trigger: state
      entity_id:
        - cover.sonoff_10018b1f1b
      attribute: current_position
    conditions:
    # Triggers either track state changes or attribute changes; I need to track current_position but
    # only care when it's opening.
    - alias: Is opening
      condition: template
      value_template: >
        {{ trigger.to_state.state == 'opening' }}
    - alias: Triggered not by HA automation
      condition: template
      # See the design doc for the comprehensive analysis of move events for different triggers
      value_template: >
        {# HA sets parent_id for automation-triggered moves #}
        {{ trigger.to_state.context.parent_id == none }}
    - alias: Exceeds safe limit
      condition: template
      value_template: >
        {# Default to 100 to not block manual moves for unknown limits #}
        {{ trigger.to_state.attributes.current_position > states('sensor.awning_max_safe_opening') | int(100) }}
    actions:
    - action: cover.set_cover_position
      target:
        entity_id: cover.sonoff_10018b1f1b
      data:
        position: "{{ states('sensor.awning_max_safe_opening') | int }}"

  - alias: "Awning safety: enforce safe limit"
    description: "Enforce the maximum awning opening limit to prevent damage."
    id: fe2464e3-3e29-4289-afd5-3b98e03d2474
    mode: single
    trigger:
    - trigger: state
      entity_id: sensor.awning_max_safe_opening
    condition:
    - condition: template
      value_template: >
        {# Only react if the current position exceeds the safe limit #}
        {% set current = state_attr('cover.sonoff_10018b1f1b', 'current_position') | int(0) %}
        {# Default to 0 to force-close the awning when the safe limit is unavailable #}
        {% set safe = states('sensor.awning_max_safe_opening') | int(0) %}
        {{ current > safe }}
    action:
    - action: cover.set_cover_position
      target:
        entity_id: cover.sonoff_10018b1f1b
      data:
        position: "{{ states('sensor.awning_max_safe_opening') | int(0) }}"

  - alias: "Awning: enable auto mode"
    id: c2ee768f-ee08-4b2b-8bec-5f20c2865908
    mode: single
    triggers:
    - trigger: state
      entity_id:
      - input_select.awning_automation_mode
      to:
      - Auto
    conditions:
    # Do not move the awning in case the end state is unknown;
    # there is a separate automation to close it for safety reasons
    - condition: template
      value_template: "{{ has_value('sensor.awning_auto_opening') }}"      
    actions:
    - action: cover.set_cover_position
      target:
        entity_id: cover.sonoff_10018b1f1b
      data:
        position: '{{ states(''sensor.awning_auto_opening'') | int }}'

  - alias: "Awning comfort: provide shade"
    description: 'Automatically open and close the awning based on the weather and the sun position.'
    id: cd3bf0ba-eea4-4507-bf78-e63bfeff89f4
    mode: single
    triggers:
    - trigger: state
      entity_id:
      - sensor.awning_auto_opening
    conditions:
    - condition: state
      entity_id: input_select.awning_automation_mode
      state:
      - Auto
    # Do not move the awning when the safety automation is expected to act
    - condition: template
      value_template: >
        {% set next_auto = trigger.to_state.state | int %}
        {# Default to 0 for unknown as this case should be handled by the safety automation #}
        {% set safe = states('sensor.awning_max_safe_opening') | int(0) %}

        {{ next_auto < safe }}
    # Do not move the awning in case the end state is unknown;
    # there is a separate automation to close it for safety reasons
    - condition: template
      value_template: "{{ has_value('sensor.awning_auto_opening') }}"
    # Do not move the awning if the suggested level is lower than the current;
    # Safety-driven retractions will be handled by the safety automation anyway.
    - condition: template
      value_template: >
        {% set new_value = trigger.to_state.state | int %}
        {# Default to 0 for unknown to not block any awning moves #}
        {% set actual_position = state_attr('cover.sonoff_10018b1f1b', 'current_position') | int(0) %}

        {% set is_extending_more = new_value > actual_position %}
        {% set is_fully_retracting = new_value == 0 %}

        {{ is_extending_more or is_fully_retracting }}
    actions:
    - action: cover.set_cover_position
      target:
        entity_id: cover.sonoff_10018b1f1b
      data:
        position: '{{ trigger.to_state.state | int }}'

  - alias: 'Block awning for high winds'
    description: Creates calendar events for the hours with high wind gusts in the forecast to block the awning from being extended.
    id: 'block_awning_for_high_winds'
    triggers:
    - entity_id: sensor.awning_forecast_data
      trigger: state
      attribute: hourly
    conditions:
    - alias: Forecast data available
      condition: template
      value_template: '{{ (state_attr(''sensor.awning_forecast_data'', ''hourly'') | default([], true)) |
        length > 0 }}'
    actions:
    - variables:
        # TODO: use varibale as the same value is used in the sensor.awning_max_safe_opening
        max_allowed_wind_gusts: 45
    - variables:
        windy_hours: >
          {{ state_attr('sensor.awning_forecast_data', 'hourly') 
            | selectattr('wind_gust_speed', 'gt', max_allowed_wind_gusts) | list }}
    - action: script.join_adjacent_forecast_blocks
      data:
        input_hours: '{{ windy_hours }}'
      response_variable: aggregated
    - repeat:
        for_each: '{{ aggregated.events }}'
        sequence:
          - action: google.create_event
            target:
              entity_id: calendar.markise
            data:
              summary: "HA: High winds"
              description: "Forecasted wind gusts > {{ max_allowed_wind_gusts }} km/h"
              start_date_time: "{{ repeat.item.start }}"
              end_date_time: "{{ repeat.item.end }}"

  - alias: 'Block awning for precipitation'
    description: Creates calendar events for the hours with precipitation in the forecast to block the awning from being extended.
    id: 'block_awning_for_precipitation'
    triggers:
    - entity_id: sensor.awning_forecast_data
      trigger: state
      attribute: hourly
    conditions:
    - alias: Forecast data available
      condition: template
      value_template: '{{ (state_attr(''sensor.awning_forecast_data'', ''hourly'') | default([], true)) |
        length > 0 }}'
    actions:
    - variables:
        max_allowed_precipitation: 0.0
    - variables:
        windy_hours: >
          {{ state_attr('sensor.awning_forecast_data', 'hourly') 
            | selectattr('precipitation', 'gt', max_allowed_precipitation) | list }}
    - action: script.join_adjacent_forecast_blocks
      data:
        input_hours: '{{ windy_hours }}'
      response_variable: aggregated
    - repeat:
        for_each: '{{ aggregated.events }}'
        sequence:
          - action: google.create_event
            target:
              entity_id: calendar.markise
            data:
              summary: "HA: Precipitation"
              description: "Forecasted precipitation > {{ max_allowed_precipitation }} mm/h"
              start_date_time: "{{ repeat.item.start }}"
              end_date_time: "{{ repeat.item.end }}"

  # This is a safety net automation to catch any problems in the awning automation.
  # This is quite ugly and too broad but there seems to be no other way until this FR is implemented:
  # https://community.home-assistant.io/t/event-type-for-automation-error/752268/3.
  # 
  # It requires the following in the configuration.yaml to work:
  # system_log:
  #   fire_event: true
  - alias: "Watch awning automations for errors"
    id: awning_automation_crash_handler
    mode: parallel
    trigger:
      - platform: event
        event_type: system_log_event
    condition:
      # There's no way to ALWAYS understand, which automation caused it, so catching everything
      - alias: "Check if this is an error from one of an automation"
        condition: template
        value_template: >
          {{ "homeassistant.components.automation" in trigger.event.data.name }}
    actions:
      - action: notify.notify
        data:
          message: "❌ Automation failed!"
      - action: notify.persistent_notification
        data:
          title: "Automation failed"
          message: >
            {{ trigger.event.data.message }}

  # Alert when critical awning sensors are unavailable/unknown to allow for manual intervention if needed.
  - alias: "Awning: alert when sensors are offline"
    id: awning_sensors_offline_alert
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - sensor.awning_max_safe_opening
          - sensor.awning_auto_opening
          - sensor.awning_forecast_data
        to:
          - unavailable
          - unknown
        # Do not alert for short unavailability (e.g. during a restart) to avoid spamming the user
        for:
          seconds: 5
    actions:
      - action: notify.notify
        data:
          message: "❌ Awning sensor has a problem!"
      - action: notify.persistent_notification
        data:
          title: "Awning sensor has a problem"
          message: >
            Sensor "{{ trigger.to_state.name }}" has changed to state: {{ trigger.to_state.state | upper }}.

            Automation may not work correctly!
